<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pac-Man Word Hunt</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #000;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  font-family: 'Courier New', monospace;
}
canvas {
  display: block;
  image-rendering: pixelated;
}
</style>
</head>
<body>
<canvas id="c" width="576" height="352"></canvas>
<script>
// ═══════════════════════════════════════════════════════════
// CONSTANTS
// ═══════════════════════════════════════════════════════════
const COLS = 36, ROWS = 22, CS = 16; // 576 × 352 px
const CW = COLS * CS, CH = ROWS * CS;

// Cell types
const W = 1; // wall
const D = 0; // dot
const P = 3; // power pellet
const G = 4; // ghost house interior
const E = 5; // empty — walkable, no dot (tunnels, ghost house surrounds)

// ═══════════════════════════════════════════════════════════
// MAZE  36 × 22  (each row must have exactly 36 elements)
// ═══════════════════════════════════════════════════════════
const MAP = [
// r0 — top border
[W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W],
// r1 — top corridor  (P at col 1 and col 34)
[W,P,D,D,D,D,D,D,D,D,D,D,D,D,D,D,D,W,W,D,D,D,D,D,D,D,D,D,D,D,D,D,D,D,P,W],
// r2 — inner wall blocks
[W,D,W,W,W,W,D,W,W,W,W,D,W,W,W,W,W,W,W,W,W,W,W,D,W,W,W,W,D,W,W,W,W,D,D,W],
// r3 — corridor with two wall dividers
[W,D,D,D,D,D,D,D,D,D,D,D,D,W,W,D,D,D,D,D,W,W,D,D,D,D,D,D,D,D,D,D,D,D,D,W],
// r4 — inner wall blocks
[W,D,W,W,W,W,D,W,W,W,W,D,W,W,W,D,W,W,W,D,W,W,W,D,W,W,W,W,D,W,W,W,W,D,D,W],
// r5 — full open corridor
[W,D,D,D,D,D,D,D,D,D,D,D,D,D,D,D,D,D,D,D,D,D,D,D,D,D,D,D,D,D,D,D,D,D,D,W],
// r6 — approach to ghost house area (upper)
[W,D,W,W,D,W,W,W,W,W,W,D,W,W,W,W,W,W,W,W,W,W,W,D,W,W,W,W,W,W,W,D,W,W,D,W],
// r7 — open gallery above ghost house
[W,D,W,W,D,D,D,D,D,D,D,D,E,E,E,E,E,E,E,E,E,E,E,E,E,D,D,D,D,D,D,D,W,W,D,W],
// r8 — TUNNEL row  (E at cols 0-2 and 33-35 = tunnel exits)
[E,E,E,D,D,D,D,D,D,D,D,D,E,G,G,G,G,G,G,G,G,G,G,E,D,D,D,D,D,D,D,D,D,E,E,E],
// r9 — ghost house row 2
[W,W,W,D,W,W,W,W,W,W,W,D,E,G,G,G,G,G,G,G,G,G,G,E,D,W,W,W,W,W,W,D,W,W,W,W],
// r10 — open gallery below ghost house
[W,D,W,W,D,D,D,D,D,D,D,D,E,E,E,E,E,E,E,E,E,E,E,E,E,D,D,D,D,D,D,D,W,W,D,W],
// r11 — TUNNEL row  (mirror of r8)
[E,E,E,D,D,D,D,D,D,D,D,D,E,E,E,E,E,E,E,E,E,E,E,E,D,D,D,D,D,D,D,D,D,E,E,E],
// r12 — approach to ghost house area (lower)
[W,D,W,W,D,W,W,W,W,W,W,D,W,W,W,W,W,W,W,W,W,W,W,D,W,W,W,W,W,W,W,D,W,W,D,W],
// r13 — full open corridor
[W,D,D,D,D,D,D,D,D,D,D,D,D,D,D,D,D,D,D,D,D,D,D,D,D,D,D,D,D,D,D,D,D,D,D,W],
// r14 — inner wall blocks
[W,D,W,W,W,W,D,W,W,W,W,D,W,W,W,D,W,W,W,D,W,W,W,D,W,W,W,W,D,W,W,W,W,D,D,W],
// r15 — corridor with two wall dividers
[W,D,D,D,D,D,D,D,D,D,D,D,D,W,W,D,D,D,D,D,W,W,D,D,D,D,D,D,D,D,D,D,D,D,D,W],
// r16 — inner wall blocks
[W,D,W,W,W,W,D,W,W,W,W,D,W,W,W,W,W,W,W,W,W,W,W,D,W,W,W,W,D,W,W,W,W,D,D,W],
// r17 — corridor
[W,D,D,D,D,D,D,D,D,D,D,D,D,D,D,D,D,W,W,D,D,D,D,D,D,D,D,D,D,D,D,D,D,D,D,W],
// r18 — inner wall blocks
[W,D,W,W,W,W,D,W,W,W,W,D,W,W,W,D,W,W,W,D,W,W,W,D,W,W,W,W,D,W,W,W,W,D,D,W],
// r19 — corridor with two wall dividers
[W,D,D,D,D,D,D,D,D,D,D,D,D,W,W,D,D,D,D,D,W,W,D,D,D,D,D,D,D,D,D,D,D,D,D,W],
// r20 — bottom corridor  (P at col 1 and col 34)
[W,P,D,D,D,D,D,D,D,D,D,D,D,W,W,D,D,D,D,D,W,W,D,D,D,D,D,D,D,D,D,D,D,D,P,W],
// r21 — bottom border
[W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W,W],
];

// Validate maze dimensions
MAP.forEach((row, r) => {
  if (row.length !== COLS)
    console.error(`Maze row ${r}: expected ${COLS} cells, got ${row.length}`);
});
if (MAP.length !== ROWS)
  console.error(`Maze: expected ${ROWS} rows, got ${MAP.length}`);

// ═══════════════════════════════════════════════════════════
// CANVAS
// ═══════════════════════════════════════════════════════════
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

// ═══════════════════════════════════════════════════════════
// DRAW MAZE  — Google Pac-Man style: thin neon-line walls
// ═══════════════════════════════════════════════════════════
function drawMaze() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, CW, CH);

  // ── dots & power pellets ──────────────────────────────────
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = MAP[r][c];
      const cx = c * CS + CS / 2, cy = r * CS + CS / 2;
      if (cell === D) {
        ctx.fillStyle = '#ffb897';
        ctx.beginPath();
        ctx.arc(cx, cy, 2.5, 0, Math.PI * 2);
        ctx.fill();
      } else if (cell === P) {
        ctx.fillStyle = '#ffb897';
        ctx.beginPath();
        ctx.arc(cx, cy, 6, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }

  // ── walls — thin neon lines along cell boundaries ─────────
  // Only draw a line where a walkable cell meets a wall cell.
  // Merge collinear segments so round caps form natural corners.
  function isWall(r, c) {
    if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return true;
    return MAP[r][c] === W;
  }

  ctx.strokeStyle = '#1a1aff';
  ctx.lineWidth   = 3;
  ctx.lineCap     = 'round';
  ctx.shadowColor = '#4466ff';
  ctx.shadowBlur  = 6;

  // Horizontal edges: scan each row boundary r→r+1
  for (let r = 0; r <= ROWS; r++) {
    let start = -1;
    for (let c = 0; c <= COLS; c++) {
      const edge = c < COLS && (isWall(r - 1, c) !== isWall(r, c));
      if (edge && start === -1) { start = c; }
      else if (!edge && start !== -1) {
        ctx.beginPath();
        ctx.moveTo(start * CS, r * CS);
        ctx.lineTo(c     * CS, r * CS);
        ctx.stroke();
        start = -1;
      }
    }
  }

  // Vertical edges: scan each column boundary c→c+1
  for (let c = 0; c <= COLS; c++) {
    let start = -1;
    for (let r = 0; r <= ROWS; r++) {
      const edge = r < ROWS && (isWall(r, c - 1) !== isWall(r, c));
      if (edge && start === -1) { start = r; }
      else if (!edge && start !== -1) {
        ctx.beginPath();
        ctx.moveTo(c * CS, start * CS);
        ctx.lineTo(c * CS, r     * CS);
        ctx.stroke();
        start = -1;
      }
    }
  }

  ctx.shadowBlur = 0;

  // ── ghost house pink border ───────────────────────────────
  ctx.strokeStyle = '#ff69b4';
  ctx.lineWidth   = 2;
  ctx.lineCap     = 'butt';
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (MAP[r][c] !== G) continue;
      const x = c * CS, y = r * CS;
      const top    = MAP[r - 1]?.[c] !== G;
      const bottom = MAP[r + 1]?.[c] !== G;
      const left   = MAP[r]?.[c - 1] !== G;
      const right  = MAP[r]?.[c + 1] !== G;
      if (top)    { ctx.beginPath(); ctx.moveTo(x,      y);      ctx.lineTo(x + CS, y);      ctx.stroke(); }
      if (bottom) { ctx.beginPath(); ctx.moveTo(x,      y + CS); ctx.lineTo(x + CS, y + CS); ctx.stroke(); }
      if (left)   { ctx.beginPath(); ctx.moveTo(x,      y);      ctx.lineTo(x,      y + CS); ctx.stroke(); }
      if (right)  { ctx.beginPath(); ctx.moveTo(x + CS, y);      ctx.lineTo(x + CS, y + CS); ctx.stroke(); }
    }
  }
}

// ═══════════════════════════════════════════════════════════
// BOOT
// ═══════════════════════════════════════════════════════════
drawMaze();
</script>
</body>
</html>
